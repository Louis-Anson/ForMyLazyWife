version: '3.8'

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "3001:3000"   # Web UI 端口，避免与 OpenClaw 的 3000 冲突
    volumes:
      - /docker/hermes/config:/app/config
      - /docker/hermes/data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - LLM_PROVIDER=openai
      - LLM_API_KEY=${HERMES_LLM_API_KEY}
      - LLM_API_BASE=http://new-api:3000/v1   # 通过 New-API 统一调用大模型
      - LOCAL_LLM_BASE=http://ollama:11434    # 备选：直连本地 Ollama
      - PORT=3000
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.relax.mycloudnas.com`)"
      - "traefik.http.routers.hermes.entrypoints=websecure"
      - "traefik.http.routers.hermes.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true
