version: '3.8'

services:
  # ==================== 家庭任务 ====================
  donetick:
    image: donetick/donetick:latest
    container_name: donetick
    restart: unless-stopped
    volumes:
      - /docker/donetick/data:/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 食物库存 ====================
  grocy:
    image: linuxserver/grocy:latest
    container_name: grocy
    restart: unless-stopped
    volumes:
      - /docker/grocy/data:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 菜谱管理 ====================
  tandoor:
    image: vabene1111/recipes:latest
    container_name: tandoor
    restart: unless-stopped
    volumes:
      - /docker/tandoor/static:/opt/recipes/staticfiles
      - /docker/tandoor/media:/opt/recipes/mediafiles
    environment:
      - SECRET_KEY=${TANDOOR_SECRET}
      - DB_ENGINE=django.db.backends.sqlite3
      - TZ=Asia/Shanghai
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 记账 ====================
  ezbookkeeping:
    image: mayswind/ezbookkeeping:latest
    container_name: ezbookkeeping
    restart: unless-stopped
    volumes:
      - /docker/ezbookkeeping/data:/var/lib/ezbookkeeping
    environment:
      - TZ=Asia/Shanghai
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 旅行规划 ====================
  trek:
    image: mauriceboe/trek:2.7.0
    container_name: trek
    restart: unless-stopped
    volumes:
      - /docker/trek/data:/app/data
    environment:
      - JWT_SECRET=${TREK_JWT_SECRET}
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 家庭资产管理 ====================
  homebox:
    image: sysadminsmedia/homebox:latest
    container_name: homebox
    restart: unless-stopped
    volumes:
      - /share/Container/homebox/data:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
      - HBOX_LOG_LEVEL=info
      - HBOX_ALLOW_REGISTRATION=false
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homebox.rule=Host(`homebox.aiJiaS.local`)"
      - "traefik.http.routers.homebox.entrypoints=websecure"
      - "traefik.http.routers.homebox.tls.certresolver=letsencrypt"
      - "traefik.http.services.homebox.loadbalancer.server.port=7745"

networks:
  traefik-public:
    external: true
